name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - "web/backend/**"
      - "web/backend_agent/**"
      - "scripts/**"
      - "docker-compose.prod.yml"
      - ".gitattributes"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  BACKEND_IMAGE: schonavi-backend:local

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v3

      - name: Load deployment secrets from Doppler
        id: doppler
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          get_secret() {
            doppler secrets get "$1" --project schonavi --config prd --plain --raw
          }

          write_output() {
            local name="$1"
            local value="$2"
            local delimiter="EOF_${name}_$(date +%s%N)"

            {
              echo "$name<<$delimiter"
              echo "$value"
              echo "$delimiter"
            } >> "$GITHUB_OUTPUT"
          }

          write_output "SERVER_HOST" "$(get_secret SERVER_HOST)"
          write_output "SERVER_USER" "$(get_secret SERVER_USER)"
          write_output "SERVER_PASSWORD" "$(get_secret SERVER_PASSWORD)"
          write_output "SERVER_SSH_PORT" "$(get_secret SERVER_SSH_PORT)"

      - name: Package backend source
        run: |
          tar \
            --exclude='web/backend/.env*' \
            --exclude='web/backend/.pytest_cache' \
            --exclude='web/backend/__pycache__' \
            -czf backend_src.tar.gz -C web backend

      - name: Package backend agent source
        run: |
          tar \
            --exclude='web/backend_agent/.env*' \
            --exclude='web/backend_agent/.venv' \
            --exclude='web/backend_agent/.pytest_cache' \
            --exclude='web/backend_agent/.pytest_tmp' \
            --exclude='web/backend_agent/.omo' \
            --exclude='web/backend_agent/.opencode' \
            --exclude='web/backend_agent/data' \
            --exclude='web/backend_agent/logs' \
            -czf backend_agent_src.tar.gz -C web backend_agent

      - name: Upload compose file
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ steps.doppler.outputs.SERVER_HOST }}
          username: ${{ steps.doppler.outputs.SERVER_USER }}
          password: ${{ steps.doppler.outputs.SERVER_PASSWORD }}
          port: ${{ steps.doppler.outputs.SERVER_SSH_PORT }}
          source: "docker-compose.prod.yml,scripts/deploy_backend_agent.sh,backend_src.tar.gz,backend_agent_src.tar.gz"
          target: "/opt/schonavi"
          overwrite: true

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ steps.doppler.outputs.SERVER_HOST }}
          username: ${{ steps.doppler.outputs.SERVER_USER }}
          password: ${{ steps.doppler.outputs.SERVER_PASSWORD }}
          port: ${{ steps.doppler.outputs.SERVER_SSH_PORT }}
          command_timeout: 60m
          script: |
            set -e
            export DOPPLER_TOKEN='${{ secrets.DOPPLER_TOKEN }}'
            cd /opt/schonavi
            chmod +x scripts/deploy_backend_agent.sh
            doppler run --project schonavi --config prd -- ./scripts/deploy_backend_agent.sh
            export BACKEND_IMAGE=${{ env.BACKEND_IMAGE }}
            doppler run --project schonavi --config prd -- docker compose -f docker-compose.prod.yml build backend
            doppler run --project schonavi --config prd -- docker compose -f docker-compose.prod.yml up -d --no-build
            doppler run --project schonavi --config prd -- docker compose -f docker-compose.prod.yml exec -T backend sh -lc 'if [ "${SKIP_AGENT_REBUILD:-false}" != "true" ] && ls "$BACKEND_AGENT_PATH"/raw_data/*.db >/dev/null 2>&1; then cd "$BACKEND_AGENT_PATH" && python -m app.jobs.rebuild_all; else echo "skip agent rebuild"; fi'
