version: '3.8'
services:
  backend:
    image: ghcr.io/${GITHUB_OWNER:-github-org}/light-graph-rec:dev
    ports:
      - "8000:8000"
    volumes:
      - /opt/light-graph-rec/data:/app/data
      - /opt/light-graph-rec/logs:/app/logs
    env_file:
      - /opt/light-graph-rec/.env.cloud
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - app-net
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - /opt/light-graph-rec/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    restart: always
    networks:
      - app-net
networks:
  app-net:
    driver: bridge