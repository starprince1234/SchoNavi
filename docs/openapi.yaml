openapi: 3.1.0
info:
  title: SchoNavi API
  version: 1.0.0
  description: Contract-first API for the Flutter client.
servers:
  - url: /api/v1
paths:
  /home/prompts:
    get:
      summary: Fetch suggested home prompts.
      parameters:
        - name: mode
          in: query
          required: true
          schema:
            type: string
            enum: [mentor, competition]
      responses:
        '200':
          description: Prompt list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HomePromptsEnvelope'
  /recommendations/mentors:
    post:
      summary: Get mentor recommendations.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MentorRecommendationRequest'
      responses:
        '200':
          description: Recommendation result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MentorRecommendationEnvelope'
  /recommendations/competitions:
    post:
      summary: Get competition recommendations.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompetitionRecommendationRequest'
      responses:
        '200':
          description: Competition recommendation result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompetitionRecommendationEnvelope'
  /professors/{professor_id}:
    get:
      summary: Get professor detail.
      parameters:
        - $ref: '#/components/parameters/ProfessorId'
      responses:
        '200':
          description: Professor detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfessorEnvelope'
  /identity/anonymous:
    post:
      summary: Create an installation-level anonymous identity.
      responses:
        '200':
          description: Anonymous bearer credential; also sets the secure Web cookie.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnonymousIdentityEnvelope'
  /chat/sessions:
    post:
      summary: Create a general or professor-anchored conversation.
      security:
        - bearerAuth: []
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SessionCreateRequest'
      responses:
        '200':
          description: Created session descriptor.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionEnvelope'
    get:
      summary: List non-fork conversations owned by the current identity.
      security:
        - bearerAuth: []
        - cookieAuth: []
      responses:
        '200':
          description: Active root conversations.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionListEnvelope'
  /chat/sessions/{session_id}:
    get:
      summary: Load the persisted aggregate for one conversation.
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          description: Session, projected turns, and messages. Fork responses contain only fork-owned turns and messages; inherited source context is not exposed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionAggregateEnvelope'
    delete:
      summary: Delete a conversation; deleting a root cascades to its forks.
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          description: Deletion result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeletedEnvelope'
  /chat/sessions/{session_id}/turns:
    get:
      summary: Load projected turns and messages for a conversation. Fork responses contain only fork-owned history.
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          description: Turn and message projection.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TurnListEnvelope'
    post:
      summary: Persist a user turn and stream its route and assistant attempt.
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/SessionId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TurnCreateRequest'
      responses:
        '200':
          description: SSE ack, route, delta, completed, and error events. Every event includes session_id, turn_id, attempt_id, and revision.
          content:
            text/event-stream:
              schema: { type: string }
  /chat/sessions/{session_id}/forks:
    get:
      summary: List forks below a root conversation.
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          description: Fork descriptors.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionListEnvelope'
    post:
      summary: Create or reuse the unique fork at a recommendation source turn.
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/SessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForkCreateRequest'
      responses:
        '200':
          description: Created or reused fork descriptor.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionEnvelope'
  /chat/turns/{turn_id}/attempts:
    post:
      summary: Regenerate an existing turn without adding a user message.
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/TurnId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttemptCreateRequest'
      responses:
        '200':
          description: SSE events with the same grammar as turn submission.
          content:
            text/event-stream:
              schema: { type: string }
  /chat/attempts/{attempt_id}/cancel:
    post:
      summary: Persist an active attempt as interrupted.
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/AttemptId'
      responses:
        '200':
          description: Interruption result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InterruptedEnvelope'
  /chat/messages/{message_id}/feedback:
    patch:
      summary: Persist assistant-message feedback.
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/MessageId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FeedbackRequest'
      responses:
        '200':
          description: Feedback update result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdatedEnvelope'
  /chat/messages:
    post:
      deprecated: true
      summary: Send a legacy non-streaming chat message.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatMessageRequest'
      responses:
        '200':
          description: Chat response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatMessageEnvelope'
  /chat/stream:
    get:
      summary: Stream chat reply through Server-Sent Events.
      parameters:
        - name: session_id
          in: query
          required: true
          schema: { type: string }
        - name: message
          in: query
          required: true
          schema: { type: string }
        - name: professor_id
          in: query
          required: false
          schema: { type: string }
      responses:
        '200':
          description: SSE stream with delta, related_recommendations, done, and error events.
          content:
            text/event-stream:
              schema:
                type: string
  /chat/route:
    post:
      summary: Decide whether a follow-up needs a new round of recommendations.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatRouteRequest'
      responses:
        '200':
          description: Routing decision.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatRouteEnvelope'
  /professors/compare:
    post:
      summary: Compare professors.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [professor_ids]
              properties:
                professor_ids:
                  type: array
                  minItems: 2
                  maxItems: 3
                  items: { type: string }
      responses:
        '200':
          description: Comparison report.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ComparisonEnvelope'
  /professors/{professor_id}/match-analysis:
    post:
      summary: Analyze profile-professor match.
      parameters:
        - $ref: '#/components/parameters/ProfessorId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [profile]
              properties:
                profile:
                  $ref: '#/components/schemas/UserProfile'
      responses:
        '200':
          description: Match analysis.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MatchAnalysisEnvelope'
  /professors/{professor_id}/outreach-email:
    post:
      summary: Generate outreach email.
      parameters:
        - $ref: '#/components/parameters/ProfessorId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [profile]
              properties:
                profile:
                  $ref: '#/components/schemas/UserProfile'
      responses:
        '200':
          description: Email draft.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmailDraftEnvelope'
  /profile/achievements/extract:
    post:
      summary: Extract structured achievements.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [raw_text]
              properties:
                raw_text: { type: string }
      responses:
        '200':
          description: Achievement draft.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AchievementDraftEnvelope'
  /preparation-plans/generate:
    post:
      summary: Generate personalized optional tasks and advice for a preparation plan.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PreparationPlanGenerateRequest'
      responses:
        '200':
          description: Personalized preparation plan augmentation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PreparationPlanGenerateEnvelope'
  /profile:
    get:
      summary: Load current profile.
      responses:
        '200':
          description: User profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfileEnvelope'
    put:
      summary: Save current profile.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserProfile'
      responses:
        '200':
          description: Saved profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfileEnvelope'
    delete:
      summary: Clear current profile.
      responses:
        '200':
          description: Clear result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClearedEnvelope'
  /favorites:
    get:
      summary: List favorites.
      responses:
        '200':
          description: Favorites.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FavoritesEnvelope'
  /favorites/{professor_id}:
    put:
      summary: Add favorite professor snapshot.
      parameters:
        - $ref: '#/components/parameters/ProfessorId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FavoriteItem'
      responses:
        '200':
          description: Favorite status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FavoriteStatusEnvelope'
    delete:
      summary: Remove favorite.
      parameters:
        - $ref: '#/components/parameters/ProfessorId'
      responses:
        '200':
          description: Favorite status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FavoriteRemovedEnvelope'
  /history:
    get:
      summary: List search history.
      responses:
        '200':
          description: History.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HistoryEnvelope'
    post:
      summary: Add search history entry.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchHistoryItem'
      responses:
        '200':
          description: Saved history item.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HistoryItemEnvelope'
    delete:
      summary: Clear all search history.
      responses:
        '200':
          description: Clear result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClearedEnvelope'
  /history/{session_id}:
    delete:
      summary: Remove one search history item.
      parameters:
        - name: session_id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Remove result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RemovedEnvelope'
components:
  parameters:
    ProfessorId:
      name: professor_id
      in: path
      required: true
      schema:
        type: string
    SessionId:
      name: session_id
      in: path
      required: true
      schema: { type: string, format: uuid }
    TurnId:
      name: turn_id
      in: path
      required: true
      schema: { type: string, format: uuid }
    AttemptId:
      name: attempt_id
      in: path
      required: true
      schema: { type: string, format: uuid }
    MessageId:
      name: message_id
      in: path
      required: true
      schema: { type: string, format: uuid }
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema: { type: string, format: uuid }
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
    cookieAuth:
      type: apiKey
      in: cookie
      name: scho_anonymous
  schemas:
    EnvelopeBase:
      type: object
      required: [code, message]
      properties:
        code: { type: integer }
        message: { type: string }
        data: true
    CompetitionRulesSummary:
      type: object
      required: [signup_time, contest_time, team_size, format, organizer]
      properties:
        signup_time: { type: string }
        contest_time: { type: string }
        team_size: { type: string }
        format: { type: string }
        organizer: { type: string }
        official_url: { type: string }
    CompetitionSnapshot:
      type: object
      required: [id, name, category, rules_summary]
      properties:
        id: { type: string }
        name: { type: string }
        category: { type: string }
        rules_summary:
          $ref: '#/components/schemas/CompetitionRulesSummary'
    WeeklyCommitment:
      type: string
      enum: [hours3to5, hours6to10, hours11to15, hours16plus]
    ExperienceLevel:
      type: string
      enum: [beginner, intermediate, experienced]
    PreparationPlanGenerateRequest:
      type: object
      required: [competition, target_date, weekly_commitment, experience_level, phase_keys]
      properties:
        competition:
          $ref: '#/components/schemas/CompetitionSnapshot'
        target_date: { type: string, format: date-time }
        weekly_commitment:
          $ref: '#/components/schemas/WeeklyCommitment'
        experience_level:
          $ref: '#/components/schemas/ExperienceLevel'
        phase_keys:
          type: array
          items: { type: string }
        user_profile:
          $ref: '#/components/schemas/UserProfile'
    PreparationOptionalTaskSuggestion:
      type: object
      required: [title, estimated_hours]
      properties:
        template_key: { type: string }
        title: { type: string, minLength: 1 }
        estimated_hours: { type: number }
    PreparationPhasePersonalization:
      type: object
      required: [key, optional_tasks]
      properties:
        key: { type: string }
        optional_tasks:
          type: array
          maxItems: 3
          items:
            $ref: '#/components/schemas/PreparationOptionalTaskSuggestion'
        personalized_advice: { type: string }
    PreparationPlanGenerateResult:
      type: object
      required: [phases]
      properties:
        phases:
          type: array
          items:
            $ref: '#/components/schemas/PreparationPhasePersonalization'
        global_advice: { type: string }
    PreparationPlanGenerateEnvelope:
      allOf:
        - $ref: '#/components/schemas/EnvelopeBase'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/PreparationPlanGenerateResult'
    AnonymousIdentity:
      type: object
      required: [owner_id, access_token]
      properties:
        owner_id: { type: string, format: uuid }
        access_token: { type: string }
    SessionCreateRequest:
      type: object
      properties:
        kind:
          type: string
          enum: [general, professor]
          default: general
        professor_id: { type: [string, 'null'] }
    ForkCreateRequest:
      type: object
      required: [source_turn_id, professor_id]
      properties:
        source_turn_id: { type: string, format: uuid }
        professor_id: { type: string }
    TurnCreateRequest:
      type: object
      required: [text, request_id, expected_revision]
      properties:
        text: { type: string, minLength: 1 }
        request_id: { type: string, format: uuid }
        expected_revision: { type: integer, minimum: 0 }
    AttemptCreateRequest:
      type: object
      required: [session_id, request_id, expected_revision]
      properties:
        session_id: { type: string, format: uuid }
        request_id: { type: string, format: uuid }
        expected_revision: { type: integer, minimum: 0 }
    FeedbackRequest:
      type: object
      required: [feedback]
      properties:
        feedback:
          type: string
          enum: [none, like, dislike]
    ConversationSession:
      type: object
      required: [id, kind, root_session_id, revision, created_at, updated_at, legacy_context_incomplete]
      properties:
        id: { type: string, format: uuid }
        kind: { type: string, enum: [general, professor, fork] }
        root_session_id: { type: string, format: uuid }
        source_session_id: { type: [string, 'null'], format: uuid }
        source_turn_id: { type: [string, 'null'], format: uuid }
        professor_id: { type: [string, 'null'] }
        revision: { type: integer, minimum: 0 }
        title: { type: [string, 'null'] }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        deleted_at: { type: [string, 'null'], format: date-time }
        legacy_context_incomplete: { type: boolean }
    ConversationTurn:
      type: object
      required: [id, session_id, ordinal, status, user_message_id, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        session_id: { type: string, format: uuid }
        ordinal: { type: integer, minimum: 0 }
        status:
          type: string
          enum: [queued, classifying, connecting, streaming, recommending, committing, completed, failed, interrupted]
        route: { type: [string, 'null'], enum: [recommendation, conversation, forkReroute, null] }
        user_message_id: { type: string, format: uuid }
        active_attempt_id: { type: [string, 'null'], format: uuid }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    ConversationMessage:
      type: object
      required: [id, turn_id, role, content, created_at, status, kind, feedback, related_recommendations]
      properties:
        id: { type: string, format: uuid }
        turn_id: { type: string, format: uuid }
        role: { type: string, enum: [user, assistant, system] }
        content: { type: string }
        created_at: { type: string, format: date-time }
        status: { type: string, enum: [sending, streaming, done, error, interrupted] }
        kind: { type: string }
        feedback: { type: string, enum: [none, like, dislike] }
        related_recommendations:
          type: array
          items:
            $ref: '#/components/schemas/Recommendation'
    ConversationAggregate:
      type: object
      required: [session, turns, messages]
      properties:
        session:
          $ref: '#/components/schemas/ConversationSession'
        turns:
          type: array
          items:
            $ref: '#/components/schemas/ConversationTurn'
        messages:
          type: array
          items:
            $ref: '#/components/schemas/ConversationMessage'
    TurnList:
      type: object
      required: [turns, messages]
      properties:
        turns:
          type: array
          items:
            $ref: '#/components/schemas/ConversationTurn'
        messages:
          type: array
          items:
            $ref: '#/components/schemas/ConversationMessage'
    SessionList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ConversationSession'
    DeletedResult:
      type: object
      required: [deleted]
      properties:
        deleted: { type: boolean }
    InterruptedResult:
      type: object
      required: [interrupted]
      properties:
        interrupted: { type: boolean }
    UpdatedResult:
      type: object
      required: [updated]
      properties:
        updated: { type: boolean }
    HomePrompt:
      type: object
      required: [text]
      properties:
        text: { type: string }
    AcademicScore:
      type: object
      properties:
        gpa: { type: number }
        scale: { type: number }
        rank: { type: string }
    Competition:
      type: object
      required: [name]
      properties:
        name: { type: string }
        level: { type: string }
        award: { type: string }
        year: { type: string }
    ResearchItem:
      type: object
      required: [type, title]
      properties:
        type:
          type: string
          enum: [paper, project, patent, other]
        title: { type: string }
        role: { type: string }
        venue_or_status: { type: string }
        year: { type: string }
    UserProfile:
      type: object
      properties:
        name: { type: string }
        gender:
          type: string
          enum: [male, female, other, undisclosed]
        degree_stage: { type: string }
        target_degree: { type: string }
        school: { type: string }
        major: { type: string }
        research_interests:
          type: array
          items: { type: string }
        highlights: { type: string }
        score:
          $ref: '#/components/schemas/AcademicScore'
        competitions:
          type: array
          items:
            $ref: '#/components/schemas/Competition'
        research:
          type: array
          items:
            $ref: '#/components/schemas/ResearchItem'
    QueryUnderstanding:
      type: object
      required: [research_interests, preferred_locations, preferred_universities, uncertainties]
      properties:
        research_interests:
          type: array
          items: { type: string }
        preferred_locations:
          type: array
          items: { type: string }
        preferred_universities:
          type: array
          items: { type: string }
        degree_stage: { type: string }
        uncertainties:
          type: array
          items: { type: string }
    Recommendation:
      type: object
      required: [professor_id, name, university, college, title, research_fields, match_level, reason, limitations]
      properties:
        professor_id: { type: string }
        name: { type: string }
        university: { type: string }
        college: { type: string }
        title: { type: string }
        research_fields:
          type: array
          items: { type: string }
        homepage_url: { type: string }
        match_level:
          type: string
          enum: [高, 中, 低]
        match_score: { type: number, minimum: 0, maximum: 1 }
        reason: { type: string }
        limitations:
          type: array
          items: { type: string }
    Professor:
      type: object
      required: [professor_id, name, university, college, title, research_fields]
      properties:
        professor_id: { type: string }
        name: { type: string }
        university: { type: string }
        college: { type: string }
        title: { type: string }
        research_fields:
          type: array
          items: { type: string }
        bio: { type: string }
        homepage_url: { type: string }
        source_url: { type: string }
        updated_at: { type: string }
